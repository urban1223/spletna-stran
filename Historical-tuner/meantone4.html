<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meantone 1/4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">
    <div class="panel-title">Meantone 1/4</div>

    <div class="gauge-container">
        <div id="markers"></div>
        <div class="needle" id="needle"></div>
    </div>

    <div class="big-note" id="note-name">--</div>

    <div class="stats-row">
        <div class="cents-val" id="cents-display">0.0 ¢</div>
        <div class="hz-display" id="hz-display">0.00 Hz</div>
    </div>

    <button id="mic-btn" class="mic-btn">TURN ON MIC</button>

    <div class="settings-bar has-refresh">
        <div class="setting-item">
            <label>Reference A</label>
            <input type="number" id="a-ref" value="415" step="0.1" min="350" max="560">
        </div>
        <div class="setting-item">
            <label>Waveform</label>
            <select id="wave-type">
                <option value="triangle" selected>Triangle</option>
                <option value="sine">Sine</option>
                <option value="sawtooth">Sawtooth</option>
            </select>
        </div>
        <div class="setting-item">
            <label>System</label>
            <button class="refresh-btn" id="refresh-btn">Refresh</button>
        </div>
    </div>

    <div class="enharmonic-container" id="enharmonic-container"></div>

    <div class="keyboard-panel" id="keyboard-panel">
        <div class="keyboard-panel-header">
            <button class="expand-btn" id="expand-btn">Expand</button>
        </div>
        <div class="keyboard" id="kb"></div>
    </div>
</div>

<script src="tuner.js"></script>
<script>
initTuner({
    noteNames: ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "G♯", "A", "B♭", "B"],
    cents: [0, 76.43, 193.53, 310.68, 386.73, 503.88, 579.74, 696.84, 772.63, 889.37, 1006.45, 1082.49],
    enharmonic: [
        { idx: 1, options: [{ label: 'C♯', cents: 76.43 }, { label: 'D♭', cents: 139.96 }] },
        { idx: 3, options: [{ label: 'E♭', cents: 310.68 }, { label: 'D♯', cents: 269.52 }] },
        { idx: 6, options: [{ label: 'F♯', cents: 579.52 }, { label: 'G♭', cents: 643.20 }] },
        { idx: 8, options: [{ label: 'G♯', cents: 772.63 }, { label: 'A♭', cents: 813.25 }] },
        { idx: 10, options: [{ label: 'B♭', cents: 1006.45 }, { label: 'A♯', cents: 965.48 }] }
    ]
});
</script>
</body>
</html>
