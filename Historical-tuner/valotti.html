<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Valotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141a24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uglaševalec">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
      }
    </script>
</head>
<body>

<div class="panel">
    <div class="panel-title">Valotti</div>

    <div class="gauge-container">
        <div id="markers"></div>
        <div class="needle" id="needle"></div>
    </div>

    <div class="big-note" id="note-name">--</div>

    <div class="stats-row">
        <div class="cents-val" id="cents-display">0.0 ¢</div>
        <div class="hz-display" id="hz-display">0.00 Hz</div>
    </div>

    <button id="mic-btn" class="mic-btn">TURN ON MIC</button>

    <div class="settings-bar">
        <div class="setting-item">
            <label>Reference A</label>
            <input type="number" id="a-ref" value="415" step="0.1" min="350" max="560">
        </div>
        <div class="setting-item">
            <label>Waveform</label>
            <select id="wave-type">
                <option value="triangle" selected>Triangle</option>
                <option value="sine">Sine</option>
                <option value="sawtooth">Sawtooth</option>
            </select>
        </div>
    </div>

    <div class="keyboard-panel" id="keyboard-panel">
        <div class="keyboard-panel-header">
            <button class="expand-btn" id="expand-btn">Expand</button>
        </div>
        <div class="keyboard" id="kb"></div>
    </div>
</div>

<script src="tuner.js"></script>
<script>
initTuner({
    noteNames: ["C", "C♯", "D", "D♯", "E", "F", "F♯", "G", "G♯", "A", "B♭", "B"],
    cents: [0, 93.83, 196.12, 297.80, 391.68, 501.88, 592.01, 697.63, 795.55, 893.37, 999.46, 1089.60]
});
</script>
</body>
</html>
