<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Meantone 1/6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141a24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Uglaševalec">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
      }
    </script>
</head>
<body>

<div class="panel">
    <div class="panel-title">Meantone 1/6</div>

    <div class="gauge-container">
        <div id="markers"></div>
        <div class="needle" id="needle"></div>
    </div>

    <div class="big-note" id="note-name">--</div>

    <div class="stats-row">
        <div class="cents-val" id="cents-display">0.0 ¢</div>
        <div class="hz-display" id="hz-display">0.00 Hz</div>
    </div>

    <button id="mic-btn" class="mic-btn">TURN ON MIC</button>

    <div class="settings-bar has-refresh">
        <div class="setting-item">
            <label>Reference A</label>
            <input type="number" id="a-ref" value="415" step="0.1" min="350" max="560">
        </div>
        <div class="setting-item">
            <label>Waveform</label>
            <select id="wave-type">
                <option value="triangle" selected>Triangle</option>
                <option value="sine">Sine</option>
                <option value="sawtooth">Sawtooth</option>
            </select>
        </div>
        <div class="setting-item">
            <label>System</label>
            <button class="refresh-btn" id="refresh-btn">Refresh</button>
        </div>
    </div>

    <div class="enharmonic-container" id="enharmonic-container"></div>

    <div class="keyboard-panel" id="keyboard-panel">
        <div class="keyboard-panel-header">
            <button class="expand-btn" id="expand-btn">Expand</button>
        </div>
        <div class="keyboard" id="kb"></div>
    </div>
</div>

<script src="tuner.js"></script>
<script>
initTuner({
    noteNames: ["C", "C♯", "D", "E♭", "E", "F", "F♯", "G", "G♯", "A", "B♭", "B"],
    cents: [0.00, 88.59, 196.74, 304.89, 393.48, 501.63, 590.22, 698.37, 786.96, 895.11, 1010.52, 1091.85],
    enharmonic: [
        { idx: 1, options: [{ label: 'C♯', cents: 88.59 }, { label: 'D♭', cents: 111.73 }] },
        { idx: 3, options: [{ label: 'E♭', cents: 304.89 }, { label: 'D♯', cents: 277.33 }] },
        { idx: 6, options: [{ label: 'F♯', cents: 590.22 }, { label: 'G♭', cents: 613.26 }] },
        { idx: 8, options: [{ label: 'G♯', cents: 786.96 }, { label: 'A♭', cents: 809.96 }] },
        { idx: 10, options: [{ label: 'B♭', cents: 1010.52 }, { label: 'A♯', cents: 975.22 }] }
    ]
});
</script>
</body>
</html>
