<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nova akademija — Fingering Charts</title>
    <meta name="description" content="Interactive fingering chart reference for traverso, recorder and baroque oboe. Build, save and print your own fingering charts.">

    <!-- PWA povezave -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141a24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fingering Charts">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

    <link rel="stylesheet" href="shared-style.css">
    <link rel="stylesheet" href="style.css">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker ready!'))
                    .catch(err => console.error('SW error:', err));
            });
        }
    </script>
</head>
<body class="themed-bg">
<div class="wrap">
    <header class="page-header">
        <h1 id="pageTitle">Fingering Charts</h1>
        <p id="pageSubtitle">personal reference chart</p>
    </header>

    <!-- 1. korak: izbira inštrumenta -->
    <div class="panel select-screen" id="selectScreen">
        <h2 class="select-title">Choose an instrument</h2>
        <div class="instrument-grid" id="instrumentGrid"></div>
    </div>

    <!-- 2. korak: sestavljalnik za izbran inštrument -->
    <div id="builderScreen" class="hidden">
        <button class="link-btn" id="backBtn">← change instrument</button>

        <div class="builder panel">
            <div class="flute" id="fluteMount"></div>
            <div class="name-row">
                <input type="text" id="noteName" placeholder="note name (e.g. d', f#'')" />
                <button id="addBtn" title="add">+</button>
            </div>
            <div class="hint" id="hint"></div>
        </div>

        <div class="list" id="list"></div>

        <div class="toolbar">
            <button class="export-btn secondary" id="exportBtn">export chart</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
